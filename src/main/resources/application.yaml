server:
  port: 0


spring:
  kafka:
    bootstrap-servers: localhost:9092  # 必配
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer  # ✅ 改这里
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer  # ✅ 改这里
      properties:
        spring.json.trusted.packages: "*"  # 🔐 安全配置，必须加
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848  # Nacos地址
        service: ${spring.application.name}-http  # 注册为HTTP服务，网关路由时使用
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    h2:
      console:
        enabled: true
        path: /h2-console
    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: create-drop
      show-sql: true
      defer-datasource-initialization: true

dubbo:
  application:
    name: ${spring.application.name}
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: -1
  consumer:
    check: false
  scan:
    base-packages: com.liuyi.chat  # ❗缺少这个配置

# 打印所有请求详情（包括 headers、body）
logging:
  level:
    org:
      springframework:
        web:
          servlet:
            DispatcherServlet:
              DEBUG
            mvc:
              method:
                annotation:
                  DEBUG